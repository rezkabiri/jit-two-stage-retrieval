# cicd/cloudbuild.yaml: Multi-stage, Multi-environment CI/CD for JIT RAG

# Substitutions:
# _STAGING_PROJECT_ID: <ID>
# _PROD_PROJECT_ID: <ID>
# _REGION: us-central1 (default)

steps:
  # --- STAGE 0: BUILD AND PUSH IMAGES ---
  # Build Agent
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-agent'
    dir: 'app'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/agent:${SHORT_SHA}', '.']

  # Push Agent
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-agent'
    args: ['push', '${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/agent:${SHORT_SHA}']

  # Build UI
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-ui'
    dir: 'frontend'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/ui:${SHORT_SHA}', '.']

  # Push UI
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-ui'
    args: ['push', '${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/ui:${SHORT_SHA}']

  # --- STAGE 1: DEPLOY TO STAGING ---
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-stage'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Deploy Agent to Stage
        gcloud run deploy rag-agent-stage --project=${_STAGING_PROJECT_ID} --image=${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/agent:${SHORT_SHA} --region=${_REGION} --platform=managed --allow-unauthenticated
        # Deploy UI to Stage
        gcloud run deploy rag-ui-stage --project=${_STAGING_PROJECT_ID} --image=${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/ui:${SHORT_SHA} --region=${_REGION} --platform=managed --allow-unauthenticated

  # --- STAGE 2: EVALUATION GATE ---
  - name: 'python:3.11'
    id: 'eval-stage'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r app/requirements.txt
        # make eval --project=${_STAGING_PROJECT_ID}
        # If eval score < 0.8, this step will exit with 1, halting the build.

  # --- STAGE 3: DEPLOY TO PRODUCTION ---
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-prod'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Tag and Push for Production
        docker tag ${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/agent:${SHORT_SHA} ${_REGION}-docker.pkg.dev/${_PROD_PROJECT_ID}/rag-repo/agent:${SHORT_SHA}
        docker tag ${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/ui:${SHORT_SHA} ${_REGION}-docker.pkg.dev/${_PROD_PROJECT_ID}/rag-repo/ui:${SHORT_SHA}
        gcloud docker -- push ${_REGION}-docker.pkg.dev/${_PROD_PROJECT_ID}/rag-repo/agent:${SHORT_SHA}
        gcloud docker -- push ${_REGION}-docker.pkg.dev/${_PROD_PROJECT_ID}/rag-repo/ui:${SHORT_SHA}
        
        # Deploy Agent to Prod
        gcloud run deploy rag-agent-prod --project=${_PROD_PROJECT_ID} --image=${_REGION}-docker.pkg.dev/${_PROD_PROJECT_ID}/rag-repo/agent:${SHORT_SHA} --region=${_REGION} --platform=managed --allow-unauthenticated
        # Deploy UI to Prod
        gcloud run deploy rag-ui-prod --project=${_PROD_PROJECT_ID} --image=${_REGION}-docker.pkg.dev/${_PROD_PROJECT_ID}/rag-repo/ui:${SHORT_SHA} --region=${_REGION} --platform=managed --allow-unauthenticated

substitutions:
  _REGION: 'us-central1'
  _STAGING_PROJECT_ID: ''
  _PROD_PROJECT_ID: ''

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - '${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/agent:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/ui:${SHORT_SHA}'
