# cicd/cloudbuild.yaml: Multi-stage, Multi-environment CI/CD for JIT RAG

# Substitutions:
# _STAGING_PROJECT_ID: <ID>
# _PROD_PROJECT_ID: <ID>
# _REGION: us-central1 (default)

steps:
  # --- STAGE 0: PREPARE CACHE ---
  - name: 'gcr.io/cloud-builders/docker'
    id: 'pull-cache-agent'
    entrypoint: 'bash'
    args: ['-c', 'docker pull ${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/agent:latest || true']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'pull-cache-ui'
    entrypoint: 'bash'
    args: ['-c', 'docker pull ${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/ui:latest || true']

  # --- STAGE 1: BUILD AND PUSH IMAGES ---
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-agent'
    args: [
      'build', 
      '-t', '${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/agent:${SHORT_SHA}', 
      '-t', '${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/agent:latest',
      '--cache-from', '${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/agent:latest',
      '-f', 'app/Dockerfile',
      '.'
    ]

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-ui'
    args: [
      'build', 
      '-t', '${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/ui:${SHORT_SHA}', 
      '-t', '${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/ui:latest',
      '--cache-from', '${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/ui:latest',
      '-f', 'frontend/Dockerfile',
      '.'
    ]

  # Push Images to STAGING
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-images-staging'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        docker push ${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/agent:${SHORT_SHA}
        docker push ${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/agent:latest
        docker push ${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/ui:${SHORT_SHA}
        docker push ${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/ui:latest

  # --- STAGE 2: DEPLOY TO STAGING ---
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-stage'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        gcloud run deploy rag-agent-stage \
          --project=${_STAGING_PROJECT_ID} \
          --image=${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/agent:${SHORT_SHA} \
          --region=${_REGION} \
          --platform=managed \
          --set-env-vars="GOOGLE_CLOUD_PROJECT=${_STAGING_PROJECT_ID},GOOGLE_CLOUD_LOCATION=us-central1,DATA_STORE_ID=rag-docs-stage-25d725d6,GOOGLE_GENAI_USE_VERTEXAI=True" \
          --timeout=600 \
          --no-allow-unauthenticated


  # --- STAGE 3: EVALUATION GATE ---
  - name: 'python:3.11'
    id: 'eval-stage'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        pip install -r app/requirements.txt
        # make eval --project=${_STAGING_PROJECT_ID}

  # --- STAGE 4: PROMOTE TO PRODUCTION (TAG & PUSH) ---
  - name: 'gcr.io/cloud-builders/docker'
    id: 'tag-and-push-prod'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        if [ -z "${_PROD_PROJECT_ID}" ]; then
          echo "⚠️ WARNING: _PROD_PROJECT_ID is empty. Skipping Production steps."
          exit 0
        fi
        echo "🚀 PROMOTING TO PROD: ${_PROD_PROJECT_ID}"
        
        docker tag ${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/agent:${SHORT_SHA} ${_REGION}-docker.pkg.dev/${_PROD_PROJECT_ID}/rag-repo/agent:${SHORT_SHA}
        docker tag ${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/ui:${SHORT_SHA} ${_REGION}-docker.pkg.dev/${_PROD_PROJECT_ID}/rag-repo/ui:${SHORT_SHA}
        
        docker push ${_REGION}-docker.pkg.dev/${_PROD_PROJECT_ID}/rag-repo/agent:${SHORT_SHA}
        docker push ${_REGION}-docker.pkg.dev/${_PROD_PROJECT_ID}/rag-repo/ui:${SHORT_SHA}

  # --- STAGE 5: DEPLOY TO PRODUCTION ---
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-prod'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        if [ -z "${_PROD_PROJECT_ID}" ]; then exit 0; fi
        echo "🚢 DEPLOYING TO PROD CLOUD RUN: ${_PROD_PROJECT_ID}"
        gcloud run deploy rag-agent-prod \
          --project=${_PROD_PROJECT_ID} \
          --image=${_REGION}-docker.pkg.dev/${_PROD_PROJECT_ID}/rag-repo/agent:${SHORT_SHA} \
          --region=${_REGION} \
          --platform=managed \
          --set-env-vars="GOOGLE_CLOUD_PROJECT=${_PROD_PROJECT_ID},DATA_STORE_ID=rag-docs-prod,GOOGLE_GENAI_USE_VERTEXAI=True" \
          --no-allow-unauthenticated
        gcloud run deploy rag-ui-prod --project=${_PROD_PROJECT_ID} --image=${_REGION}-docker.pkg.dev/${_PROD_PROJECT_ID}/rag-repo/ui:${SHORT_SHA} --region=${_REGION} --platform=managed --no-allow-unauthenticated

substitutions:
  _REGION: 'us-central1'
  _STAGING_PROJECT_ID: ''
  _PROD_PROJECT_ID: ''

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - '${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/agent:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${_STAGING_PROJECT_ID}/rag-repo/ui:${SHORT_SHA}'
